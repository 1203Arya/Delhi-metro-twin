name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────── Python backend + simulation + db + ai ───────────────
  python:
    name: Backend · Simulation · DB · AI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: dmdt_test
          POSTGRES_USER: dmdt_test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dmdt_test -d dmdt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: dmdt
          RABBITMQ_DEFAULT_PASS: test
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://dmdt_test:test@postgres:5432/dmdt_test
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://dmdt:test@rabbitmq:5672/
      JWT_SECRET: ci-secret
      ENVIRONMENT: test
      PYTHONPATH: backend:simulation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Install simulation deps
        working-directory: simulation
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/app simulation/dmdt_sim
      - name: Format check (ruff)
        run: ruff format --check backend/app simulation/dmdt_sim
      - name: Apply migrations
        working-directory: database
        run: |
          alembic -c alembic.ini upgrade head || true
      - name: Seed network (smoke)
        working-directory: scripts
        run: python seed_network.py --check || true
      - name: Backend tests
        working-directory: backend
        run: pytest -q --cov=app --cov-report=xml
      - name: Simulation tests
        working-directory: simulation
        run: pytest -q --cov=dmdt_sim --cov-report=xml
      - name: Cross-cutting tests
        working-directory: tests
        run: pytest -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            backend/coverage.xml
            simulation/coverage.xml

  web:
    name: Frontend · Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint -- --max-warnings=0
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Unit tests
        working-directory: web
        run: npm test -- --run
      - name: Build
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
          NEXT_PUBLIC_WS_BASE: ws://localhost:8000
          NEXT_PUBLIC_MAP_STYLE_URL: https://demotiles.maplibre.org/style.json
        run: npm run build

  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: tests/e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          tags: dmdt/backend:ci
      - name: Build simulation image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/simulation/Dockerfile
          push: false
          tags: dmdt/simulation:ci
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          tags: dmdt/web:ci
