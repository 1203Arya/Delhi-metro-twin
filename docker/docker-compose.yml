# ─────────────────────────────────────────────────────────────
# Delhi Metro Digital Twin — full-stack Docker Compose
# Orchestrates: Postgres+PostGIS, Redis, RabbitMQ, Backend,
# Simulation engine, Frontend, plus optional observability.
# ─────────────────────────────────────────────────────────────
name: dmdt

x-restart: &default-restart
  restart: unless-stopped

services:
  # ──────────────── Postgres + PostGIS ────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dmdt-postgres
    <<: *default-restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmdt}
      POSTGRES_USER: ${POSTGRES_USER:-dmdt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [dmdt-net]

  # ──────────────── Redis ────────────────
  redis:
    image: redis:7-alpine
    container_name: dmdt-redis
    <<: *default-restart
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [dmdt-net]

  # ──────────────── RabbitMQ (management) ────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: dmdt-rabbitmq
    <<: *default-restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dmdt}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me-in-dev}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [dmdt-net]

  # ──────────────── Backend (FastAPI + WS) ────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: dmdt-backend
    <<: *default-restart
    env_file:
      - ../configs/dev.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SIM_HOST: simulation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      simulation:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../simulation:/app/simulation
      - ../gis:/app/gis
      - ../database:/app/database
      - ../scripts:/app/scripts
      - ../configs:/app/configs:ro
    command: ["sh", "-c", "cd database && alembic upgrade head && cd .. && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [dmdt-net]

  # ──────────────── Simulation engine ────────────────
  simulation:
    build:
      context: ..
      dockerfile: docker/simulation/Dockerfile
    container_name: dmdt-simulation
    <<: *default-restart
    env_file:
      - ../configs/dev.env
    environment:
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../simulation:/app/simulation
      - ../gis:/app/gis
      - ../database:/app/database
      - ../backend/app:/app/backend/app
      - ../configs:/app/configs:ro
    command: ["python", "-m", "dmdt_sim.main", "--duration", "86400", "--seed", "42", "--quiet"]
    networks: [dmdt-net]

  # ──────────────── Frontend (Next.js) ────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: dmdt-frontend
    <<: *default-restart
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_WS_BASE: ${NEXT_PUBLIC_WS_BASE}
      NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    command: ["sh", "-c", "npm install && npm run dev -- -H 0.0.0.0 -p 3000"]
    networks: [dmdt-net]

  # ──────────────── Prometheus (metrics scrape) ────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: dmdt-prometheus
    <<: *default-restart
    profiles: ["observe"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [dmdt-net]

networks:
  dmdt-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
